# =============================================================================
# Server 1 (Control Node) — Full Stack
# 包含：Nginx + Leverage Frontend + Leverage Backend + MariaDB + Redis + Botzone-Neo
#
# 使用方法：
#   cd /opt/leverage-stack    # 或你的部署目录
#   cp deploy/.env.server1.example .env
#   编辑 .env，填写所有必填项
#   docker compose -f deploy/docker-compose.server1.yml up -d
#
# 目录结构要求（同级）：
#   /opt/leverage-stack/
#   ├── leverage-backend-neo/    (git clone)
#   ├── leverage-frontend-neo/   (git clone)
#   ├── botzone-neo/             (git clone)
#   └── deploy/                  (本文件所在目录)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Nginx 反向代理
  # 对外暴露 80 / 443，转发 /api → leverage-backend，静态资源 → frontend
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: leverage-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../leverage-backend-neo/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - nginx_certs:/etc/nginx/certs:ro        # 可选：SSL 证书目录
    depends_on:
      - leverage-backend
      - leverage-frontend
    networks:
      - leverage-internal
      - botzone-internal

  # ---------------------------------------------------------------------------
  # Frontend Builder (Nuxt SSG)
  # 构建完毕后退出，输出挂载到 nginx 静态目录
  # ---------------------------------------------------------------------------
  leverage-frontend:
    build:
      context: ../leverage-frontend-neo
      dockerfile: Dockerfile
    container_name: leverage-frontend
    restart: "no"
    volumes:
      - frontend_dist:/app/.output/public
    environment:
      NUXT_PUBLIC_API_BASE: /api
    networks:
      - leverage-internal

  # ---------------------------------------------------------------------------
  # Leverage Backend (NestJS)
  # ---------------------------------------------------------------------------
  leverage-backend:
    build:
      context: ../leverage-backend-neo
      dockerfile: Dockerfile
    container_name: leverage-backend
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ../.env                                # 根目录 .env（从 .env.server1.example 复制）
    environment:
      NODE_ENV: production
      DB_HOST: mariadb
      DB_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # botzone-neo 在同一内网，直接用服务名访问
      BOTZONE_BASE_URL: http://botzone-neo:3001
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      botzone-neo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    stop_signal: SIGTERM
    stop_grace_period: 30s
    networks:
      - leverage-internal
    volumes:
      - backend_uploads:/app/uploads

  # ---------------------------------------------------------------------------
  # MariaDB
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:10.11
    container_name: leverage-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-leverage}
      MYSQL_USER: ${DB_USERNAME:-leverage}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leverage-internal
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  # ---------------------------------------------------------------------------
  # Redis（共享队列）
  # 需对 Worker 服务器暴露端口 —— 通过 Tailscale/VPN 保护！
  # 生产环境必须设置 REDIS_PASSWORD
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: leverage-redis
    restart: unless-stopped
    # bind 0.0.0.0 以便 Worker 服务器可通过 Tailscale IP 连接
    command: >
      sh -c "redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --bind 0.0.0.0
      $${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}"
    ports:
      # ⚠️  仅通过 Tailscale/VPN 网络暴露，禁止公网直接访问！
      - "${REDIS_BIND_IP:-127.0.0.1}:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: >
        sh -c "redis-cli $${REDIS_PASSWORD:+-a $$REDIS_PASSWORD} ping"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leverage-internal
      - botzone-internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ---------------------------------------------------------------------------
  # Botzone-Neo（Control Node 上的 Worker）
  # 同时作为 HTTP API 入口（leverage-backend 调用）和队列消费者
  # ---------------------------------------------------------------------------
  botzone-neo:
    build:
      context: ../botzone-neo
      dockerfile: docker/Dockerfile
    container_name: botzone-neo-worker
    restart: unless-stopped
    expose:
      - "3001"
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: "3001"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SANDBOX_BACKEND: nsjail
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - leverage-internal
      - botzone-internal
    volumes:
      - botzone_cache:/app/.cache
      - botzone_data:/app/.data
    # nsjail 需要特权模式运行沙箱
    privileged: true
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 512M

# =============================================================================
# Volumes
# =============================================================================
volumes:
  mariadb_data:
    name: leverage-mariadb-data
  redis_data:
    name: leverage-redis-data
  backend_uploads:
    name: leverage-backend-uploads
  frontend_dist:
    name: leverage-frontend-dist
  botzone_cache:
    name: botzone-neo-cache
  botzone_data:
    name: botzone-neo-data
  nginx_certs:
    name: leverage-nginx-certs

# =============================================================================
# Networks
# =============================================================================
networks:
  leverage-internal:
    name: leverage-internal
    driver: bridge
  botzone-internal:
    name: botzone-internal
    driver: bridge
