# nsjail 默认配置文件
# 详细文档：https://github.com/google/nsjail

name: "botzone-sandbox"

mode: ONCE

# 资源限制（可被命令行参数覆盖）
time_limit: 5
rlimit_as: 256
rlimit_cpu: 5
rlimit_fsize: 64
rlimit_nofile: 64

# 基础只读挂载
mount {
  src: "/bin"
  dst: "/bin"
  is_bind: true
}

mount {
  src: "/lib"
  dst: "/lib"
  is_bind: true
}

mount {
  src: "/lib64"
  dst: "/lib64"
  is_bind: true
  mandatory: false
}

mount {
  src: "/usr"
  dst: "/usr"
  is_bind: true
}

# /tmp 可写
mount {
  dst: "/tmp"
  fstype: "tmpfs"
  rw: true
}

# /dev/null, /dev/zero, /dev/urandom
mount {
  src: "/dev/null"
  dst: "/dev/null"
  is_bind: true
}

mount {
  src: "/dev/zero"
  dst: "/dev/zero"
  is_bind: true
}

mount {
  src: "/dev/urandom"
  dst: "/dev/urandom"
  is_bind: true
}

# 用户映射
uid_mapping {
  inside_id: "0"
  outside_id: "65534"
  count: 1
}

gid_mapping {
  inside_id: "0"
  outside_id: "65534"
  count: 1
}

# 禁止网络
clone_newnet: true
