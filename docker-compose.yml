services:
  judger:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: botzone-judger
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - botzone-internal
    # nsjail 需要特权模式
    privileged: true
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: botzone-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - botzone-internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

volumes:
  redis-data:
    name: botzone-redis-data

networks:
  botzone-internal:
    name: botzone-internal
    driver: bridge
    internal: true
